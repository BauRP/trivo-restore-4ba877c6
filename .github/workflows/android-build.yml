name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          npm run build
          rm -rf dist
          mkdir -p dist
          # Копируем всё из папок сборки (поддерживаем TanStack/Vite)
          [ -d ".output/public" ] && cp -r .output/public/* dist/ || true
          [ -d "dist/client" ] && cp -r dist/client/* dist/ || true
          
          # Генерируем index.html если он отсутствует (критично для мессенджера)
          if [ ! -f "dist/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head><body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/index.html
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Messenger-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
