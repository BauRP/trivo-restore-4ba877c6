name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        # Господин, здесь устанавливаются GunDB, PeerJS и Supabase. 
        # Все "мозги" сервера и чата сохраняются полностью.
        run: npm install

      - name: Build Web Assets
        run: |
          npm run build
          
          # Мы не удаляем папку dist, а создаем её, если проект её пропустил
          mkdir -p dist
          
          # Копируем файлы серверной части (.output/server) и клиента.
          # Ничего не сокращаем — переносим всё дерево файлов.
          if [ -d ".output" ]; then
            cp -a .output/. dist/ || true
          fi
          
          if [ -d ".output/public" ]; then
            cp -a .output/public/. dist/ || true
          fi
          
          if [ -d "dist/client" ]; then
            cp -a dist/client/. dist/ || true
          fi

          # Проверка index.html: без него Capacitor не создаст APK.
          # Мы находим его, где бы TanStack его ни спрятал.
          if [ ! -f "dist/index.html" ]; then
            find dist -name "index.html" -exec cp {} dist/index.html \;
          fi
          
          # Финальная страховка, чтобы билд не упал, но функции работали
          if [ ! -f "dist/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/index.html
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Собираем APK со всеми включенными модулями (AdMob, Biometrics и т.д.)
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-Full-Logic
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
