name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          # 1. Запускаем чистую сборку проекта
          npm run build
          
          # 2. Подготавливаем папку dist. 
          # Вместо удаления всей папки, мы убеждаемся, что она пуста перед копированием новых ассетов.
          mkdir -p dist
          rm -rf dist/*
          
          # 3. Переносим файлы из папки сборки TanStack Start
          # Мы берем всё из .output/public, где лежат готовые статические файлы
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          fi
          
          # 4. Если файлы оказались в dist/client, вытаскиваем их в корень dist.
          # Это критически важно, чтобы Android нашел JS и CSS и не было белого экрана.
          if [ -d "dist/client" ]; then
            cp -r dist/client/* dist/
          fi

          # 5. Финальная проверка index.html. Пути внутри него теперь будут работать 
          # благодаря вашим правкам в vite.config.ts (base: './')
          if [ ! -f "dist/index.html" ]; then
            find dist -name "index.html" -exec cp {} dist/index.html \;
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Собираем чистый APK со всеми вашими функциями
          ./gradlew clean assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-Final-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
