name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        # Господин, устанавливаем всё: от базы данных до инструментов сборки
        run: npm install

      - name: Build Web Assets
        # Сохраняем все серверные и клиентские файлы без потерь
        run: |
          npm run build
          # Если папки dist нет, создаем её (не удаляя существующее)
          mkdir -p dist
          # Копируем результаты сборки TanStack Start
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          fi
          
          # Проверка на наличие главного файла, чтобы APK не был пустым
          if [ ! -f "dist/index.html" ] && [ -f ".output/public/index.html" ]; then
            cp .output/public/index.html dist/index.html
          fi

      - name: Sync Capacitor Android
        # Теперь команда сработает, так как мы обновили package.json
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
