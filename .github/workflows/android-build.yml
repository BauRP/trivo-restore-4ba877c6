name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        # Господин, здесь устанавливаются GunDB, PeerJS и Supabase. 
        # Все "мозги" сервера и чата сохраняются полностью.
        run: npm install

      - name: Build Web Assets
        run: |
          # Полная сборка TanStack Start (клиент + воркер).
          # Воркер не используется в APK, но билд эмитит и статический клиент.
          npm run build

          # TanStack Start emits the static client into .output/public, while
          # Capacitor reads web assets from ./dist (webDir: "dist"). Move the
          # exact emitted web root into dist so the Android build never sees an
          # empty or stale folder.
          if [ ! -f ".output/public/index.html" ]; then
            echo "::error::.output/public/index.html not found after npm run build — cannot prepare Capacitor web root."
            echo "Build output tree for debugging:"
            ls -la .output 2>/dev/null || true
            ls -la .output/public 2>/dev/null || true
            exit 1
          fi

          rm -rf dist
          mv .output/public dist

          # Жёсткая проверка: без index.html Capacitor покажет белый экран.
          if [ ! -f "dist/index.html" ]; then
            echo "::error::dist/index.html not found after build — Capacitor would render a white screen."
            echo "Build output tree for debugging:"
            ls -la .output 2>/dev/null || true
            ls -la dist 2>/dev/null || true
            exit 1
          fi

          echo "Capacitor web root prepared:"
          ls -la dist | head -40

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # Собираем APK со всеми включенными модулями (AdMob, Biometrics и т.д.)
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-Full-Logic
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
