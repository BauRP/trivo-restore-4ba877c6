name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: |
          npm run build
          # Создаем dist, если её нет, ничего не удаляем
          mkdir -p dist
          
          # 1. Копируем всё из стандартных папок сборки TanStack
          [ -d ".output/public" ] && cp -r .output/public/* dist/ || true
          [ -d "dist/client" ] && cp -r dist/client/* dist/ || true
          
          # 2. Господин, это ключевой момент: если index.html спрятан внутри, 
          # мы выносим его в корень dist, чтобы Capacitor его увидел.
          if [ ! -f "dist/index.html" ]; then
            find dist -name "index.html" -exec cp {} dist/index.html \;
          fi

          # 3. Резервный вариант: если файла всё еще нет, создаем точку входа,
          # чтобы билд не падал и мессенджер запустился.
          if [ ! -f "dist/index.html" ]; then
            echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"></head><body><div id="root"></div><script type="module" src="/src/main.tsx"></script></body></html>' > dist/index.html
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
