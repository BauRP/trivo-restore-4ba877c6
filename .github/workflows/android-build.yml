name: Build Messenger APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        # Устанавливаем всё необходимое для работы сервера и мессенджера
        run: npm install

      - name: Build Web Assets
        # Сохраняем все серверные и клиентские файлы в папку dist для Capacitor
        run: |
          npm run build
          mkdir -p dist
          if [ -d ".output/public" ]; then
            cp -r .output/public/* dist/
          fi
          # Проверка на наличие главного файла
          if [ ! -f "dist/index.html" ] && [ -f ".output/public/index.html" ]; then
            cp .output/public/index.html dist/index.html
          fi

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK
        # Собираем APK со всеми включенными функциями
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivo-Chat-Elite-APK
          # Исправленный путь: ищем любые собранные APK в папке вывода
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 7
